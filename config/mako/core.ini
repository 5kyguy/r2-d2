anchor=top-right
default-timeout=5000
width=420
outer-margin=20
padding=10,15
border-size=2
max-icon-size=32
font=sans-serif 14px

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

[mode=do-not-disturb app-name=k2so]
invisible=false

[urgency=critical]
default-timeout=0
layer=overlay

[app-name=k2so]
default-timeout=12000
height=140

[summary~="Setup Wi-Fi"]
on-button-left=exec sh -c 'r2-d2-notification-dismiss "Setup Wi-Fi"; r2-d2-launch-wifi'

[summary~="Update System"]
on-button-left=exec sh -c 'r2-d2-notification-dismiss "Update System"; r2-d2-launch-floating-terminal-with-presentation r2-d2-update'

[summary~="Learn Keybindings"]
on-button-left=exec sh -c 'r2-d2-notification-dismiss "Learn Keybindings"; r2-d2-menu-keybindings'

[summary~="Screenshot copied & saved"]
max-icon-size=80
format=<b>%s</b>\n%b
