# Menus and launchers
bindd = SUPER, SPACE, Launch apps, exec, r2-d2-launch-walker
bindd = SUPER CTRL, E, Emoji picker, exec, r2-d2-launch-walker -m symbols
bindd = SUPER CTRL, SPACE, Background selector, exec, r2-d2-launch-walker -m menus:r2-d2-background-selector --width 800 --minheight 400
bindd = SUPER ALT, SPACE, R2-D2 menu, exec, r2-d2-menu
bindd = SUPER, ESCAPE, System menu, exec, r2-d2-menu system
bindld = , XF86PowerOff, Power menu, exec, r2-d2-menu system
bindd = SUPER, K, Show key bindings, exec, r2-d2-menu-keybindings
bindd = SUPER CTRL, S, Share, exec, r2-d2-menu share

# System settings (Super + Shift + letter)
bindd = SUPER SHIFT, B, Bluetooth controls, exec, r2-d2-launch-bluetooth
bindd = SUPER SHIFT, W, Wifi controls, exec, r2-d2-launch-wifi
bindd = SUPER SHIFT, A, Audio controls, exec, r2-d2-launch-audio
bindd = SUPER SHIFT, I, Activity, exec, r2-d2-launch-tui btop
bindd = SUPER SHIFT, S, Screenshot, exec, r2-d2-cmd-screenshot
bindd = SUPER SHIFT, D, Toggle device display, exec, r2-d2-toggle-builtin-display
bindd = SUPER SHIFT, M, Toggle display mirror, exec, r2-d2-toggle-display-mirror
bindd = SUPER SHIFT, N, Toggle notification silencing, exec, r2-d2-toggle-notification-silencing
bindd = SUPER SHIFT, P, Power profile, exec, r2-d2-menu power
bindd = SUPER SHIFT, L, Apply monitor layout (external left), exec, r2-d2-hyprland-monitor-layout external-left

# Captures (hardware keys)
bindd = , PRINT, Screenshot, exec, r2-d2-cmd-screenshot
bindd = ALT, PRINT, Screenrecording, exec, r2-d2-menu screenrecord