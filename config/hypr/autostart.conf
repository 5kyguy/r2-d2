# hypridle (idle lock) off by default; use r2-d2-toggle-idle to enable
# Clear built-in display toggle state on login (session-only, resets on reboot)
exec-once = rm -f ~/.local/state/r2-d2/toggles/builtin-display-disabled
exec-once = uwsm-app -- mako
exec-once = uwsm-app -- waybar
exec-once = uwsm-app -- swaybg -i ~/.local/share/r2-d2/backgrounds/@background -m fill
exec-once = uwsm-app -- swayosd-server
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = r2-d2-cmd-first-run
# Set the power profile on boot (udev rules only fire on changes, so without
# this the machine stays in the default balanced mode after a cold boot).
exec-once = r2-d2-powerprofiles-init
# Apply external-left monitor layout when 2 monitors (e.g. HDMI on left of laptop)
exec-once = bash -c 'sleep 2; r2-d2-hyprland-monitor-layout external-left 2>/dev/null || true'

# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all
