# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Default: one line per monitor or fallback for any.
# Position "auto" arranges left-to-right (order may not match physical layout).
env = GDK_SCALE,1

# vrr,1 enables FreeSync/VRR — measurable idle-power win on capable AMD panels
# (5W → 1.1W reported). No-op on monitors that don't advertise VRR.
monitor = ,preferred,auto,1,vrr,1

# --- Presets (for reference; use the script for dynamic layout) ---
# HDMI on left of laptop: external left, laptop right.
#   Run: r2-d2-hyprland-monitor-layout external-left
#   Or bind a key to: r2-d2-hyprland-monitor-layout external-left
# Laptop left, external right:
#   r2-d2-hyprland-monitor-layout external-right
#
# Optional: explicit layout when names/res are fixed (replace W with external width).
# monitor = HDMI-A-1, preferred, 0x0, 1
# monitor = eDP-1, preferred, Wx0, 1

# Optional: disable built-in when docked
# monitor = eDP-1, disable
