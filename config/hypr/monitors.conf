# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Straight 1x setup for low-resolution displays like 1080p or 1440p
env = GDK_SCALE,1

# SCREEN ON LEFT (Left Type C Port)
# monitor = DP-2, 1920x1080@100, 0x0, 1
monitor = HDMI-A-1, 1920x1080@100, 0x0, 1
monitor = eDP-1, 1920x1200@60, 1920x0, 1

# SCREEN ON RIGHT (Left Type C Port)
# monitor = eDP-1, 1920x1200@60, 0x0, 1
# monitor = DP-2, 1920x1080@100, 1920x0, 1
# monitor = HDMI-A-1, 1920x1080@100, 1920x0, 1

# DUAL MONITORS
# monitor = DP-2, 1920x1080@100, 0x0, 1
# monitor = eDP-1, 1920x1200@60, 1920x0, 1
# monitor = HDMI-A-1, 1920x1080@100, 3840x0, 1

# monitor = HDMI-A-1, 1920x1080@100, 0x0, 1
# monitor = eDP-1, disable

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
