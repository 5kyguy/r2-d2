# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Use each display's native resolution (1920x1080, 1920x1200, etc.) per machine.
# Position "auto" arranges monitors; override below for explicit layout.
env = GDK_SCALE,1

monitor = ,preferred,auto,1

# Optional: explicit layout when HDMI + laptop (HDMI left, eDP right)
# monitor = HDMI-A-1, preferred, 0x0, 1
# monitor = eDP-1, preferred, 1920x0, 1

# Optional: disable built-in when docked
# monitor = eDP-1, disable
