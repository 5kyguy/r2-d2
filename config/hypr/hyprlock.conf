# Self-contained lock screen: vhs80 colors, single password field (circles), labels

# Colors (vhs80 dark + gold)
$color         = rgba(18, 18, 18, 1.0)
$inner_color   = rgba(51, 51, 51, 0.5)
$outer_color   = rgba(198, 180, 65, 1.0)
$font_color    = rgba(198, 180, 65, 1.0)
$check_color   = rgba(39, 125, 70, 1.0)
$foreground    = rgba(198, 180, 65, 1.0)
$shadow_color  = rgba(0, 0, 0, 0.35)
$shadow_inactive = rgba(0, 0, 0, 0.27)

general {
    ignore_empty_input = true
    disable_loading_bar = false
    grace = 2
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    color = $color
    path = ~/.local/share/omarchy/default/background
    blur_passes = 2
}

animations {
    enabled = false
}

label {
    text = Hi, $USER
    color = $foreground
    font_size = 30
    font_family = "CaskaydiaMono Nerd Font Mono"
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadow_inactive
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 650, 100
    position = 0, -180
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = CaskaydiaMono Nerd Font Mono
    font_color = $font_color

    placeholder_text = <span> Use the Force 󰈷 </span>
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false

    hide_input = true
    dots_size = 0.4
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = 1
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $foreground
    font_size = 120
    font_family = "CaskaydiaMono Nerd Font Mono"
    position = 0, 280
    shadow_passes = 3
    shadow_size = 8
    shadow_color = $shadow_color
    halign = center
    valign = center
}

label {
    text = cmd[update:43200000] echo "$(date +"%A, %B %d")"
    color = $foreground
    font_size = 22
    font_family = "CaskaydiaMono Nerd Font Mono"
    position = 0, 190
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $shadow_color
    halign = center
    valign = center
}

decoration {
    rounding = 12
    blur_size = 8
    blur_passes = 2
    shadow_range = 20
    shadow_render_power = 3
    shadow_color = $shadow_color
}

auth {
    fingerprint:enabled = true
}
