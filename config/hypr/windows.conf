# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# Hyprland 0.53+ syntax
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# App-specific tweaks
source = ~/.config/hypr/apps.conf

# Fully opaque by default (active and inactive)
windowrule = opacity 1 1, match:class .*

# Partial opacity only for terminal and file manager
windowrule = opacity 0.98 1, match:class Alacritty
windowrule = opacity 0.98 1, match:class org.gnome.Nautilus
