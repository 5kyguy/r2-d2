[engine]
type = "opencode"
opencode_config = "~/.config/opencode/opencode.json"
opencode_url = "http://127.0.0.1:4096"

[agent]
name = "k2so"
default_model = "zai-coding/glm-5.2"

[daemon]
socket_path = "~/.local/state/k2so/k2so.sock"
max_concurrent_tasks = 1
workspace = "~/.local/share/k2so/workspace"
state = "~/.local/state/k2so"

[notify]
enabled = true
command = "notify-send"

[retention]
max_age_days = 14
max_tasks = 200

[memory]
enabled = true
dir = "~/.config/k2so"
reflect = true
reflect_model = "zai-coding/glm-4.5-air"
reflect_on_task_types = ["background"]
